<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Audio Analyzer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  width: 100%;
  height: 100%;
}
body {
  width: 100%;
  height: 100%;
  min-width: 480px;
  min-height: 180px;
  background: #111;
  color: #ccc;
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Layout ── */
#app {
  display: flex;
  flex-direction: row;
  width: 100%;
  height: 100%;
  padding: 8px;
  gap: 8px;
}

/* ── Left: Peak meters ── */
#peak-panel {
  display: flex;
  flex-direction: column;
  width: 290px;
  min-width: 180px;
  flex-shrink: 0;
  justify-content: center;
  gap: 4px;
}
.panel-title {
  font-size: 9px;
  color: #555;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 1px;
}
.meter-row {
  display: flex;
  align-items: stretch;
  gap: 5px;
  height: 22px;
}
.ch-label {
  width: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #aaa;
  font-weight: bold;
  font-size: 11px;
  flex-shrink: 0;
}
.meter-wrap {
  flex: 1;
  position: relative;
}
.meter-wrap canvas {
  position: absolute;
  inset: 0;
  display: block;
}
#scale-row {
  display: flex;
  align-items: stretch;
  gap: 5px;
  height: 14px;
  margin-top: 1px;
}
#scale-spacer { width: 10px; flex-shrink: 0; }
#scale-wrap { flex: 1; position: relative; }
#scale-canvas { position: absolute; inset: 0; display: block; }

/* ── Right: Phase analyzer ── */
#phase-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 160px;
}
#lissajous-wrap {
  position: relative;
  background: #080808;
  border: 1px solid #252525;
  aspect-ratio: 1 / 1;
  align-self: center;
  /* 高さを親に合わせて正方形を確定させる */
  height: 0;
  flex: 1 1 0;
  max-height: 100%;
}
#lissajous-canvas {
  position: absolute;
  inset: 0;
  display: block;
}
#corr-section {
  height: 48px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}
#corr-wrap {
  flex: 1;
  position: relative;
  background: #080808;
  border: 1px solid #252525;
}
#corr-canvas { position: absolute; inset: 0; display: block; }

/* ── Resize handle ── */
#resize-handle {
  position: fixed;
  bottom: 0;
  right: 0;
  width: 18px;
  height: 18px;
  cursor: nwse-resize;
  z-index: 999;
}
#resize-handle::after {
  content: '';
  position: absolute;
  bottom: 3px;
  right: 3px;
  width: 0;
  height: 0;
  border-style: solid;
  border-width: 0 0 8px 8px;
  border-color: transparent transparent #444 transparent;
}

/* ── Error overlay ── */
#error-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8, 8, 8, 0.94);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  z-index: 100;
}
#error-overlay p { font-size: 11px; color: #f55; text-align: center; max-width: 340px; line-height: 1.6; }

/* ── Loading indicator ── */
#loading {
  position: fixed;
  inset: 0;
  background: rgba(8,8,8,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  font-size: 11px;
  color: #555;
  letter-spacing: 3px;
}
</style>
</head>
<body>

<div id="loading">LOADING...</div>

<div id="error-overlay">
  <p id="error-msg"></p>
</div>

<div id="app">
  <!-- LEFT: Peak Meters -->
  <div id="peak-panel">
    <div class="panel-title">Peak Meter</div>
    <div class="meter-row">
      <div class="ch-label">L</div>
      <div class="meter-wrap"><canvas id="meter-l"></canvas></div>
    </div>
    <div class="meter-row">
      <div class="ch-label">R</div>
      <div class="meter-wrap"><canvas id="meter-r"></canvas></div>
    </div>
    <div id="scale-row">
      <div id="scale-spacer"></div>
      <div id="scale-wrap"><canvas id="scale-canvas"></canvas></div>
    </div>
  </div>

  <!-- RIGHT: Phase Analyzer -->
  <div id="phase-panel">
    <div class="panel-title">Phase Analyzer</div>
    <div id="lissajous-wrap">
      <canvas id="lissajous-canvas"></canvas>
    </div>
    <div id="corr-section">
      <div class="panel-title">CORR</div>
      <div id="corr-wrap"><canvas id="corr-canvas"></canvas></div>
    </div>
  </div>
</div>

<div id="resize-handle"></div>

<script src="popup.js"></script>
</body>
</html>
